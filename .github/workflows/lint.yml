name: Lint

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'lists/**'

  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: blocklists
          path: blocklists

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare templates
        run: node scripts/pipeline/prepare.js

      - name: Lint domains
        run: node scripts/lint.js
