name: Lint

on:
  push:
    branches:
      - main
    paths:
      - 'lists/**'

  pull_request:
    types: [opened, synchronize]
    paths:
      - 'lists/**'

  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: blocklists
          path: blocklists

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare templates
        run: node scripts/pipeline/prepare.js

      - name: Lint
        run: node scripts/lint.js
