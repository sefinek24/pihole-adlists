name: Update manually added domains

on:
  push:
    branches:
      - main
    paths:
      - 'lists/**'

  workflow_dispatch:

concurrency:
  group: blocklists-push
  cancel-in-progress: false

jobs:
  update-lists:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: blocklists
          path: blocklists

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "Sefinek Actions"
          git config --global user.email "sefinek.actions@gmail.com"

      - name: Clean up lists/ and commit to main
        run: |
          node scripts/remove-duplicates.js lists

          git add lists/

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes in lists/ to commit."
          else
            FILE_COUNT=$(git diff --name-only --cached | grep -c . || true)
            git commit -m "chore: cleanup lists/ [$FILE_COUNT files] [skip ci]"
            git push origin main
          fi

      - uses: ./.github/actions/process-and-commit
        with:
          commit_message: "Update previously committed blocklists in ${{ github.sha }}"
