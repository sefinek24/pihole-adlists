name: Update own lists

on:
  push:
    branches:
      - main
    paths:
      - 'lists/**'

  workflow_dispatch:

concurrency:
  group: blocklists-push
  cancel-in-progress: false

jobs:
  update-lists:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: blocklists
          path: blocklists

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "Sefinek Actions"
          git config --global user.email "sefinek.actions@gmail.com"

      - name: Deduplicate lists/ and push to main
        run: |
          node scripts/pipeline/dedupe.js lists

          git add lists/

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes in lists/ to commit."
          else
            FILE_COUNT=$(git diff --name-only --cached | grep -c . || true)
            git commit -m "Deduplicate lists/ (${{ github.sha }}) [$FILE_COUNT files] [skip ci] - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi

      - name: Copy lists to templates
        run: node scripts/pipeline/prepare.js

      - name: Deduplicate templates
        run: node scripts/pipeline/dedupe.js blocklists/templates

      - name: Apply whitelist to templates
        run: node scripts/pipeline/whitelist.js

      - name: Lint domains
        run: node scripts/lint.js

      - name: Generate all formats
        run: node scripts/generate/index.js

      - name: Update domain counts
        run: node scripts/update-counts.js

      - name: Commit and push to blocklists branch
        run: |
          cd blocklists

          git pull origin blocklists

          git add templates/ generated/ cache/

          if [ -z "$(git status --porcelain)" ]; then
            echo "Canceled. No changes to commit."
            exit 0
          fi

          MODIFIED_FILES=$(git diff --name-only HEAD | grep -v '^cache/')
          FILE_COUNT=$(echo "$MODIFIED_FILES" | grep -c . || true)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "Canceled. Only cache/ changes detected."
            exit 0
          fi

          git commit -m "Update own lists (${{ github.sha }}) [$FILE_COUNT files] - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" -m "$MODIFIED_FILES"
          git push origin blocklists
