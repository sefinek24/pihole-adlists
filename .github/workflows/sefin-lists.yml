name: Update Sefinek's lists

on:
  schedule: # https://crontab.guru
    - cron: '0 10 * * *' # At 10:00.

  workflow_dispatch:

concurrency:
  group: blocklists-push
  cancel-in-progress: false

jobs:
  generate-sefin-lists:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: blocklists
          path: blocklists

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "Sefinek Actions"
          git config --global user.email "sefinek.actions@gmail.com"

      - name: Prepare templates
        run: node scripts/prepare-templates.js

      - name: Remove duplicates from templates
        run: node scripts/remove-duplicates.js blocklists/templates

      - name: Remove domains that are on the whitelist
        run: node scripts/whitelist.js

      - name: Normalize line endings in .txt files
        run: node scripts/normalize-line-endings.js blocklists/templates

      - name: Lint
        run: node scripts/lint.js

      - name: Generate No IP list
        run: node scripts/generate/formats/noip.js

      - name: Generate 0.0.0.0 list
        run: node scripts/generate/formats/0.0.0.0.js

      - name: Generate 127.0.0.1 list
        run: node scripts/generate/formats/127.0.0.1.js

      - name: Generate AdGuard list
        run: node scripts/generate/formats/adguard.js

      - name: Generate Dnsmasq list
        run: node scripts/generate/formats/dnsmasq.js

      - name: Generate RPZ list
        run: node scripts/generate/formats/rpz.js

      - name: Generate list for Unbound
        run: node scripts/generate/formats/unbound.js

      - name: Count domains
        run: node scripts/update-number-of-domains.js

      - name: Commit and push to blocklists branch
        run: |
          cd blocklists

          git pull origin blocklists

          # Untrack templates/ if previously committed (one-time cleanup, idempotent)
          git rm -r --cached templates/ 2>/dev/null || true
          # Persist the ignore rule on the blocklists branch
          grep -qxF 'templates/' .gitignore 2>/dev/null || echo 'templates/' >> .gitignore

          git add generated/ cache/ .gitignore

          if [ -z "$(git status --porcelain)" ]; then
            echo "Canceled. No changes to commit."
            exit 0
          fi

          MODIFIED_FILES=$(git diff --name-only HEAD | grep -v '^cache/' | grep -v '^templates/')
          FILE_COUNT=$(echo "$MODIFIED_FILES" | grep -c . || true)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "Canceled. Only cache/ changes detected."
            exit 0
          fi

          git commit -m "Update of Sefinek's lists [$FILE_COUNT files] - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" -m "$MODIFIED_FILES"
          git push origin blocklists
