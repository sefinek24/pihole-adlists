name: Download and update external blocklists

on:
  schedule: # https://crontab.guru
    - cron: '0 */3 * * *' # At minute 0 past every 3rd hour.

  workflow_dispatch:

concurrency:
  group: blocklists-push
  cancel-in-progress: false

jobs:
  download-lists:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: main

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: blocklists
          path: blocklists

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "Sefinek Actions"
          git config --global user.email "sefinek.actions@gmail.com"

      - name: Download external blocklists
        run: bash bash/download.sh

      - uses: ./.github/actions/process-and-commit
        with:
          commit_message: "External blocklist update every 3h"
