name: Process and commit blocklists
description: Copy lists to templates, clean up, generate all formats, update domain counts, and push to the blocklists branch.

inputs:
  commit_message:
    description: Commit message prefix (file count and list are appended automatically)
    required: true

runs:
  using: composite
  steps:
    - name: Copy lists to templates
      shell: bash
      run: node scripts/pipeline/prepare.js

    - name: Deduplicate templates
      shell: bash
      run: node scripts/pipeline/dedupe.js blocklists/templates

    - name: Apply whitelist
      shell: bash
      run: node scripts/pipeline/whitelist.js

    - name: Lint domains
      shell: bash
      run: node scripts/lint.js

    - name: Generate all formats
      shell: bash
      run: node scripts/generate/index.js

    - name: Update domain counts
      shell: bash
      run: node scripts/update-counts.js

    - name: Commit and push to blocklists branch
      shell: bash
      run: |
        cd blocklists

        git pull origin blocklists

        # Untrack templates/ if previously committed (one-time cleanup, idempotent)
        git rm -r --cached templates/ 2>/dev/null || true

        git add generated/ cache/

        if [ -z "$(git status --porcelain)" ]; then
          echo "Canceled. No changes to commit."
          exit 0
        fi

        MODIFIED_FILES=$(git diff --name-only HEAD | grep -v '^cache/' | grep -v '^templates/')
        FILE_COUNT=$(echo "$MODIFIED_FILES" | grep -c . || true)
        if [ "$FILE_COUNT" -eq 0 ]; then
          echo "Canceled. Only cache/ changes detected."
          exit 0
        fi

        git commit -m "${{ inputs.commit_message }} [$FILE_COUNT files] - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" -m "$MODIFIED_FILES"
        git push origin blocklists
